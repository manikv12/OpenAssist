<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="512" height="512">
    <defs>
        <!-- Background -->
        <radialGradient id="bg" cx="38%" cy="35%" r="75%">
            <stop offset="0%" stop-color="#3a3a3a" />
            <stop offset="100%" stop-color="#000000" />
        </radialGradient>

        <!-- Waveform edge-fade (bright centre, transparent at edges) -->
        <linearGradient id="wf" x1="12" y1="0" x2="56" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="white" stop-opacity="0" />
            <stop offset="15%" stop-color="white" stop-opacity="0.7" />
            <stop offset="50%" stop-color="white" stop-opacity="1" />
            <stop offset="85%" stop-color="white" stop-opacity="0.7" />
            <stop offset="100%" stop-color="white" stop-opacity="0" />
        </linearGradient>
        <!-- Dim version for background layers -->
        <linearGradient id="wfd" x1="12" y1="0" x2="56" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="white" stop-opacity="0" />
            <stop offset="15%" stop-color="white" stop-opacity="0.15" />
            <stop offset="50%" stop-color="white" stop-opacity="0.3" />
            <stop offset="85%" stop-color="white" stop-opacity="0.15" />
            <stop offset="100%" stop-color="white" stop-opacity="0" />
        </linearGradient>

        <!-- Text line fade gradients -->
        <linearGradient id="l1" x1="64" y1="0" x2="104" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="white" stop-opacity="0.9" />
            <stop offset="100%" stop-color="white" stop-opacity="0" />
        </linearGradient>
        <linearGradient id="l2" x1="64" y1="0" x2="96" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="white" stop-opacity="0.7" />
            <stop offset="100%" stop-color="white" stop-opacity="0" />
        </linearGradient>
        <linearGradient id="l3" x1="64" y1="0" x2="100" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="white" stop-opacity="0.52" />
            <stop offset="100%" stop-color="white" stop-opacity="0" />
        </linearGradient>
        <linearGradient id="l4" x1="64" y1="0" x2="88" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="white" stop-opacity="0.36" />
            <stop offset="100%" stop-color="white" stop-opacity="0" />
        </linearGradient>
        <linearGradient id="l5" x1="64" y1="0" x2="94" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="white" stop-opacity="0.2" />
            <stop offset="100%" stop-color="white" stop-opacity="0" />
        </linearGradient>

        <!-- Gold ring -->
        <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#E8D48B" />
            <stop offset="40%" stop-color="#C9A84C" />
            <stop offset="60%" stop-color="#F0DFA0" />
            <stop offset="100%" stop-color="#A8882A" />
        </linearGradient>

        <!-- Vignette -->
        <radialGradient id="vignette" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="black" stop-opacity="0" />
            <stop offset="60%" stop-color="black" stop-opacity="0" />
            <stop offset="75%" stop-color="black" stop-opacity="0.08" />
            <stop offset="85%" stop-color="black" stop-opacity="0.18" />
            <stop offset="92%" stop-color="black" stop-opacity="0.3" />
            <stop offset="100%" stop-color="black" stop-opacity="0.45" />
        </radialGradient>

        <clipPath id="clip">
            <circle cx="60" cy="60" r="58.5" />
        </clipPath>
    </defs>

    <!-- Main circle -->
    <circle cx="60" cy="60" r="58.5" fill="url(#bg)" stroke="url(#gold)" stroke-width="2.8" />

    <g clip-path="url(#clip)">

        <!-- Voice waveform: single crisp wave, 4 cycles, bell-curve amplitude -->
        <!-- 8 half-cycles, each 5px wide, k=1.82. Amps: 5,10,17,22,22,17,10,5 -->
        <!-- Subtle outline glow behind the wave -->
        <path
            d="M 14 60
                 C 15.8 65, 17.2 65, 19 60
                 C 20.8 50, 22.2 50, 24 60
                 C 25.8 77, 27.2 77, 29 60
                 C 30.8 38, 32.2 38, 34 60
                 C 35.8 82, 37.2 82, 39 60
                 C 40.8 43, 42.2 43, 44 60
                 C 45.8 70, 47.2 70, 49 60
                 C 50.8 55, 52.2 55, 54 60"
            fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.15" />
        <!-- Main crisp wave -->
        <path
            d="M 14 60
                 C 15.8 65, 17.2 65, 19 60
                 C 20.8 50, 22.2 50, 24 60
                 C 25.8 77, 27.2 77, 29 60
                 C 30.8 38, 32.2 38, 34 60
                 C 35.8 82, 37.2 82, 39 60
                 C 40.8 43, 42.2 43, 44 60
                 C 45.8 70, 47.2 70, 49 60
                 C 50.8 55, 52.2 55, 54 60"
            fill="none" stroke="url(#wf)" stroke-width="2" stroke-linecap="round" />

        <!-- Divider -->
        <line x1="59" y1="30" x2="59" y2="90" stroke="white" stroke-width="0.8" opacity="0.12" />

        <!-- AI sparkles -->
        <path
            d="M99,34 C99,36.5 100.5,38 103,38 C100.5,38 99,39.5 99,42 C99,39.5 97.5,38 95,38 C97.5,38 99,36.5 99,34 Z"
            fill="white" opacity="0.65" />
        <path
            d="M94,64 C94,65.5 94.8,66.2 96.5,66.2 C94.8,66.2 94,67 94,68.5 C94,67 93.2,66.2 91.5,66.2 C93.2,66.2 94,65.5 94,64 Z"
            fill="white" opacity="0.4" />

        <!-- RIGHT: transcription lines -->
        <rect x="64" y="40" width="40" height="4" rx="2" fill="url(#l1)" />
        <rect x="64" y="51" width="32" height="3.5" rx="1.75" fill="url(#l2)" />
        <rect x="64" y="62" width="36" height="3.5" rx="1.75" fill="url(#l3)" />
        <rect x="64" y="72" width="24" height="3" rx="1.5" fill="url(#l4)" />
        <rect x="64" y="82" width="30" height="3" rx="1.5" fill="url(#l5)" />

        <!-- Vignette -->
        <circle cx="60" cy="60" r="56" fill="url(#vignette)" />
    </g>
</svg>