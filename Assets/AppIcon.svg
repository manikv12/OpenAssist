<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="512" height="512">
    <defs>
        <radialGradient id="bgGrad" cx="38%" cy="34%" r="82%">
            <stop offset="0%" stop-color="#20283A" />
            <stop offset="56%" stop-color="#0A1120" />
            <stop offset="100%" stop-color="#020305" />
        </radialGradient>

        <linearGradient id="surfaceHL" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.04" />
            <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0" />
        </linearGradient>

        <linearGradient id="lensFill" x1="0" y1="0" x2="0.3" y2="1">
            <stop offset="0%" stop-color="#1A1A2E" />
            <stop offset="50%" stop-color="#10102A" />
            <stop offset="100%" stop-color="#0A0A1E" />
        </linearGradient>

        <linearGradient id="lensShine" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22" />
            <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.04" />
            <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
        </linearGradient>

        <filter id="ambientGlow" x="-80%" y="-80%" width="260%" height="260%">
            <feGaussianBlur stdDeviation="6" />
        </filter>
        <filter id="outerGlow" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="2.5" />
        </filter>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="1.2" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Background -->
    <rect width="120" height="120" fill="#0A1120" />
    <rect width="120" height="120" fill="url(#surfaceHL)" />

    <g transform="translate(60,60) scale(1.18) translate(-60,-60)">

    <!-- Ambient surface illumination -->
    <g filter="url(#ambientGlow)" opacity="0.10">
        <rect x="32" y="26" width="56" height="46" rx="12" fill="#D8B45A" />
        <rect x="38" y="82" width="44" height="5" rx="2.5" fill="#D8B45A" />
    </g>

    <!-- Dark interior of head -->
    <rect x="35" y="29" width="50" height="40" rx="9" fill="#080E14" opacity="0.8" />

    <!-- ══ HEAD (clean neon) ══ -->
    <rect x="32" y="26" width="56" height="46" rx="12" fill="none" stroke="#D8B45A" stroke-width="2.5" />
    <rect x="32" y="26" width="56" height="46" rx="12" fill="none" stroke="#FFF0BF" stroke-width="0.8" opacity="0.8" />

    <!-- ══ BOTTOM BAR (clean neon) ══ -->
    <rect x="35" y="81" width="50" height="6" rx="3" fill="#D8B45A" />
    <rect x="36.5" y="81.75" width="47" height="4.5" rx="2.25" fill="#FFF0BF" opacity="0.7" />

    <!-- ══ SUNGLASSES (clean neon, no outer glow) ══ -->
    <path d="M40 46 C40 44 41 43 43 43 H56 C57.5 43 58 43.5 59.5 44.5 C61 43.5 61.5 43 63 43 H78 C80 43 81 44 81 46 V51 C81 54.5 78 56.5 75 56.5 H66 C63 56.5 61 54.5 61 51 V48 C60 48.5 59 48.5 58 48 V51 C58 54.5 56 56.5 53 56.5 H44 C41 56.5 40 54.5 40 51 Z"
        fill="none" stroke="#D8B45A" stroke-width="1.3" stroke-linejoin="round" />
    <path d="M40 46 C40 44 41 43 43 43 H56 C57.5 43 58 43.5 59.5 44.5 C61 43.5 61.5 43 63 43 H78 C80 43 81 44 81 46 V51 C81 54.5 78 56.5 75 56.5 H66 C63 56.5 61 54.5 61 51 V48 C60 48.5 59 48.5 58 48 V51 C58 54.5 56 56.5 53 56.5 H44 C41 56.5 40 54.5 40 51 Z"
        fill="none" stroke="#FFF0BF" stroke-width="0.5" stroke-linejoin="round" opacity="0.7" />

    <!-- Bridge — glow -->
    <path d="M57 47 C58.5 45.5 61 45.5 62.5 47" fill="none" stroke="#D8B45A" stroke-width="1.3" stroke-linecap="round" filter="url(#glow)" />
    <path d="M57 47 C58.5 45.5 61 45.5 62.5 47" fill="none" stroke="#FFF0BF" stroke-width="0.5" stroke-linecap="round" opacity="0.6" />

    <!-- Mouth -->
    <path d="M52 61 C55 63.2 64 63.2 67 61" fill="none" stroke="#D0C8A0" stroke-opacity="0.40" stroke-width="1.5" stroke-linecap="round" />

    </g>
</svg>
